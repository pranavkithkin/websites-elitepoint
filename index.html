<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Elite Point Corporate Services | UAE Company Formation & PRO Services</title>
    <meta name="description" content="Elite Point Corporate Services LLC — Expert company formation, trade licensing, PRO services, and bank account opening in the UAE. Start your business in Dubai today." />

    <!-- Preconnect to font CDN first -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Preload critical assets -->
    <link rel="preload" href="/hero-poster.jpg" as="image" />
    <link rel="preload" href="/logo.png" as="image" />

    <!-- Fonts with display=swap to prevent render blocking -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet" />
  </head>
  <body class="bg-obsidian text-ivory antialiased selection:bg-champagne/30 selection:text-champagne">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- CSS Noise Filter Overlay -->
    <svg style="display: none;">
      <filter id="noiseFilter">
        <feTurbulence type="fractalNoise" baseFrequency="0.6" numOctaves="3" stitchTiles="stitch"/>
      </filter>
    </svg>
    <div class="pointer-events-none fixed inset-0 z-50 h-full w-full opacity-5" style="filter: url(#noiseFilter);"></div>
  </body>
</html>
